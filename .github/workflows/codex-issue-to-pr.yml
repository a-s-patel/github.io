name: Codex - Issue to PR

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: codex-issue-to-pr
  cancel-in-progress: false

jobs:
  codex:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'codex-run')) ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.issue.labels.*.name, 'codex-run') &&
        contains(github.event.comment.body, 'run next task') &&
        (
          github.event.comment.user.login == 'github-actions[bot]' ||
          github.event.comment.user.login == github.repository_owner
        )
      )

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git identity
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"

      - name: Resolve Issue context (workflow_dispatch support)
        id: issuectx
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== "workflow_dispatch") {
              core.setOutput("issue_number", String(context.issue.number));
              return;
            }

            const { owner, repo } = context.repo;
            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: "codex-run",
              per_page: 50
            });

            if (!issues.data.length) {
              core.setFailed("No open issues with label 'codex-run' found for workflow_dispatch run.");
              return;
            }

            const latest = issues.data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
            core.setOutput("issue_number", String(latest.number));

      - name: Fetch Issue details
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = Number("${{ steps.issuectx.outputs.issue_number }}");

            const issue = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });

            const issueTitle = issue.data.title || "Codex task";
            const issueBody = issue.data.body || "";

            const match = issueBody.match(/^Task ID:\s*([^\s]+)\s*$/m);
            const taskId = match ? match[1].trim() : "";

            core.setOutput("issue_number", String(issueNumber));
            core.setOutput("task_id", taskId);
            core.setOutput("issue_title", issueTitle);
            core.setOutput("issue_body", issueBody);

      - name: Create working branch
        id: branch
        run: |
          BRANCH="codex/${{ steps.meta.outputs.task_id || 'task' }}-$(date +%s)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            SYSTEM ROLE:
            You are Codex operating as an autonomous site builder.

            You must implement EXACTLY ONE task: the one described in the triggering GitHub Issue.

            The Issue body includes a line:
            Task ID: <id>

            Rules:
            - Implement only this one task.
            - Create/update only what is necessary to complete it.
            - Maintain format consistency with existing pages/components.
            - Do NOT recreate pages explicitly marked as already-existing.
            - Use kebab-case slugs from card titles as specified.
            - Ensure the entire card is clickable while keeping valid HTML (avoid nested anchors).
            - If the task appears already completed, make no functional changes.

            TASK (from Issue):
            ${{ steps.meta.outputs.issue_title }}

            ISSUE BODY:
            ${{ steps.meta.outputs.issue_body }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.changes == 'true'
        run: |
          git add .
          git commit -m "Codex: execute ${{ steps.meta.outputs.task_id || 'task' }}"

      - name: Push branch
        if: steps.changes.outputs.changes == 'true'
        run: |
          git push origin ${{ steps.branch.outputs.branch }}

      - name: Create Pull Request
        if: steps.changes.outputs.changes == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch }}
          TASK_ID: ${{ steps.meta.outputs.task_id }}
          ISSUE_TITLE: ${{ steps.meta.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.meta.outputs.issue_body }}
          ISSUE_NUMBER: ${{ steps.meta.outputs.issue_number }}
        with:
          script: |
            const { owner, repo } = context.repo;

            const taskId = process.env.TASK_ID || "unknown-task";
            const issueTitle = process.env.ISSUE_TITLE || "Codex task";
            const issueBody = process.env.ISSUE_BODY || "";
            const issueNumber = Number(process.env.ISSUE_NUMBER || "0");
            const branchName = process.env.BRANCH_NAME;

            const prTitle = issueTitle.includes(taskId) ? issueTitle : `${issueTitle} (${taskId})`;

            const prBody = [
              `Task ID: ${taskId}`,
              ``,
              `Issue: #${issueNumber}`,
              ``,
              issueBody,
              ``,
              `---`,
              `Automated task execution via Codex from a codex-run issue.`
            ].join("\n");

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title: prTitle,
              head: branchName,
              base: "main",
              body: prBody
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: `Opened PR: ${pr.data.html_url}`
            });

      - name: No changes detected
        if: steps.changes.outputs.changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = Number("${{ steps.meta.outputs.issue_number }}");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: "Codex run completed, but no file changes were detected (task may already be complete)."
            });
