name: Mark Task Complete and Dispatch Next

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: read

concurrency:
  group: task-complete
  cancel-in-progress: false

jobs:
  complete_and_dispatch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify scripts exist
        shell: bash
        run: |
          set -e
          test -f scripts/mark-task-complete.mjs
          test -f scripts/dispatch-next-task.mjs
          echo "✅ scripts present"

      - name: Extract Task ID from PR body
        id: task
        shell: bash
        run: |
          BODY="${{ github.event.pull_request.body }}"
          TASK_ID=$(echo "$BODY" | sed -n 's/^Task ID:\s*//p' | head -n 1 | tr -d '\r')
          if [ -z "$TASK_ID" ]; then
            echo "No Task ID found in PR body. Skipping mark/dispatch."
            echo "task_id=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT

      - name: Mark task complete in TASKS.md
        if: steps.task.outputs.task_id != ''
        env:
          TASK_ID: ${{ steps.task.outputs.task_id }}
        run: node scripts/mark-task-complete.mjs

      - name: Dispatch next task
        if: steps.task.outputs.task_id != ''
        env:
          # Prefer PAT so the created issue triggers Codex workflow
          GITHUB_TOKEN: ${{ secrets.DISPATCH_PAT || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: node scripts/dispatch-next-task.mjs
